<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map — Voyageur</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
#leaflet-map {
  width: 100%;
  height: 100vh;
}
</style>
</head>
<body>
<div class="map-layout">
  <aside class="map-sidebar">
    <div class="map-sidebar-title">Berlin Locations</div>
    <input type="text" placeholder="Search...">
    <div class="map-places-list" id="map-places-list"></div>
  </aside>
  <div id="leaflet-map"></div>
</div>
<script src="script.js"></script>
<script>
const map = L.map('leaflet-map').setView([52.52, 13.405], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);
L.marker([52.52, 13.405]).addTo(map)
  .bindPopup("Berlin")
  .openPopup();
</script>
</body>
</html>
